apiVersion: v1
kind: Namespace
metadata:
  name: mi-namespace

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: mi-config
  namespace: mi-namespace
  labels:
    app.kubernetes.io/name: mi-config
    app.kubernetes.io/instance: mi-config
data:
  APP_PORT: 8080
  LOG_LEVEL: info

---

apiVersion: v1
kind: Secret
metadata:
  name: mi-secret
  namespace: mi-namespace
  labels:
    app.kubernetes.io/name: mi-secret
    app.kubernetes.io/instance: mi-secret
type: Opaque
data:
  PASSWORD: admin123

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mi-namespace
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: myrepo/backend:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: mi-config
            - secretRef:
                name: mi-secret
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mi-secret
                  key: PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            failureThreshold: 1

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: mi-namespace
  labels:
    app.kubernetes.io/name: backend-service
    app.kubernetes.io/instance: backend-service
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 3001
      protocol: TCP
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mi-namespace
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend-container
          image: nginx:1.21.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
      volumes:
        - name: config-volume
          configMap:
            name: mi-config
            items:
              - key: APP_PORT
                path: config.txt

---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: mi-namespace
  labels:
    app.kubernetes.io/name: frontend-service
    app.kubernetes.io/instance: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: LoadBalancer