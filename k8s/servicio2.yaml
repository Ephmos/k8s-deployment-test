apiVersion: v1
kind: Pod
metadata:
  name: mi-app
  labels:
    app: mi-app
spec:
  containers:
    - name: mi-container
      image: nginx:lates   # ❌ typo en "latest"
      ports:
        - containerPort: "80"   # ❌ debería ser integer, no string
      env:
        - name: ENVIRONMENT
          value: production
        - name: DEBUG
          value: false   # ❌ debería ser string ("false")
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
        requests:
          memory: 64Mi
          cpu: 250m
  restartPolicy: Always

---

apiVersion: v1
kind: Service
metadata:
  name: mi-servicio
spec:
  selector:
    app: mi-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080   # ❌ el contenedor expone 80, no 8080
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mi-app-wrong   # ❌ no coincide con el Pod
  template:
    metadata:
      labels:
        app: mi-app
    spec:
      containers:
        - name: mi-container
          image: nginx:latest
          ports:
            - containerPort: 80
