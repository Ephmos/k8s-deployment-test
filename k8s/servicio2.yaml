apiVersion: v1
kind: Pod
metadata:
  name: mi-app
  labels:
    app: mi-app
    app.kubernetes.io/name: mi-app
    app.kubernetes.io/instance: mi-app
spec:
  containers:
    - name: mi-container
      image: nginx:1.21.6 # Cambiado a una versión específica
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 80
      env:
        - name: ENVIRONMENT
          value: production
        - name: DEBUG
          value: "false" # Cambiado a string
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
        requests:
          memory: "64Mi"
          cpu: "250m"
  restartPolicy: Always

---

apiVersion: v1
kind: Service
metadata:
  name: mi-servicio
spec:
  selector:
    app: mi-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80 # Corregido para coincidir con el contenedor
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-deployment
  labels:
    app.kubernetes.io/name: mi-deployment
    app.kubernetes.io/instance: mi-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mi-app # Corregido para coincidir con el Pod
  template:
    metadata:
      labels:
        app: mi-app
    spec:
      containers:
        - name: mi-container
          image: nginx:1.21.6 # Cambiado a una versión específica
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80