name: Auto Fix Kubernetes YAML
on:
  pull_request:
    branches: [ main ]
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Install tools
        run: |
          npm install -g prettier
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Find all Kubernetes YAML files
        id: find
        run: |
          # Exclude common non-manifest files
          shopt -s globstar
          files=(**/*.yaml **/*.yml)
          for f in "${files[@]}"; do
            if [[ ! "$f" =~ (values|Chart|requirements|\.github) ]]; then
              echo "$f" >> k8s_files.txt
            fi
          done
      - name: Validate against Kubernetes schemas
        continue-on-error: true   # allow fixes to run even if validation fails
        run: |
          while IFS= read -r file; do
            kubeconform -strict -summary "$file"
          done < k8s_files.txt
      - name: Auto-fix formatting
        run: prettier --write $(cat k8s_files.txt)
      - name: Auto-fix common schema issues (e.g., replicas type)
        run: |
          while IFS= read -r file; do
            # Convert string replicas to int, but only where the schema expects an integer
            yq eval '(.spec.replicas | select(type == "!!str")) |= tonumber' -i "$file"
            # Add more fixes as needed (e.g., imagePullPolicy)
          done < k8s_files.txt
      - name: Run advanced AI fixes (if script exists)
        run: python fix_k8s.py || echo "No fix_k8s.py found, skipping"
      - name: Commit and push fixes
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "auto-fix-bot"
          git config user.email "bot@example.com"
          git add .
          if ! git diff --quiet --staged; then
            git commit -m "chore: auto-fix Kubernetes manifests [skip ci]"
            git push
          fi
