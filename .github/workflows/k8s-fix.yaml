---
name: Auto Fix Kubernetes YAML
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint
          npm install -g prettier
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin
          sudo snap install yq
      #- name: Validate YAML syntax
      #  run: yamllint .
      - name: Format YAML (auto-fix)
        run: prettier --write "**/*.yaml"
      - name: Validate Kubernetes schema
        run: kubeconform -strict -ignore-missing-schemas k8s.yaml
      - name: AI fix (optional advanced)
        run: python fix_k8s.py
      - name: Auto-fix common issues
        run: |
          # Fix replicas string → int
          yq -i '(.spec.replicas | select(type == "!!str")) |= tonumber' k8s.yaml
      - name: Commit fixes
        run: |
          git config user.name "auto-fix-bot"
          git config user.email "bot@example.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-fix k8s.yaml"
          git push
