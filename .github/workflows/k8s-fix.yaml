name: Kubernetes YAML Lint & AI Auto-fix

on:
  push:
    paths:
      - 'k8s/**/*.yaml'
      - 'k8s/**/*.yml'
  pull_request:
    paths:
      - 'k8s/**/*.yaml'
      - 'k8s/**/*.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-and-ai-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install openai ruamel.yaml

      - name: Validación básica con kubeconform (opcional)
        continue-on-error: true
        run: |
          curl -LO https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xzf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -summary -ignore-missing-schemas -strict k8s/ || echo "⚠️ Se encontraron errores que la IA intentará corregir."

      - name: Ejecutar agente corrector con IA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/k8s-fixer.py k8s/

      - name: Verificar cambios
        id: changes
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Cambios aplicados por la IA:"
            git diff
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ La IA no encontró mejoras necesarias."
          fi

      - name: Commit y push de correcciones
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "k8s-ai-fixer[bot]"
          git config user.email "k8s-ai-fixer[bot]@users.noreply.github.com"
          git add k8s/
          git commit -m "🤖 Corrección automática por IA de manifiestos Kubernetes"
          git push
