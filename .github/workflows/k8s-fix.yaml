name: Kubernetes YAML Lint & Auto-fix

on:
  push:
    paths:
      - 'k8s/**/*.yaml'
      - 'k8s/**/*.yml'
  pull_request:
    paths:
      - 'k8s/**/*.yaml'
      - 'k8s/**/*.yml'
  workflow_dispatch:  # Permite ejecución manual

permissions:
  contents: write      # Necesario para hacer push de correcciones automáticas
  pull-requests: write # Opcional: para comentar en PRs

jobs:
  lint-and-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python (para script de corrección)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar herramientas necesarias
        run: |
          # kubeconform (validador de esquemas Kubernetes)
          curl -LO https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xzf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          rm kubeconform-linux-amd64.tar.gz

          # yq (procesador YAML para línea de comandos)
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # yamlfmt (formateador automático de YAML)
          go install github.com/google/yamlfmt/cmd/yamlfmt@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

          # Instalar dependencias Python (ruamel.yaml para preservar comentarios)
          pip install ruamel.yaml

      - name: Ejecutar kubeconform (validación estricta)
        id: validate
        continue-on-error: true  # No detiene el flujo, queremos intentar corregir
        run: |
          echo "🔍 Validando archivos YAML con kubeconform..."
          kubeconform -summary -ignore-missing-schemas -strict -skip "CustomResourceDefinition" k8s/

      - name: Formatear YAML (yamlfmt)
        run: |
          echo "🎨 Aplicando formateo estándar YAML..."
          # Crea configuración mínima para yamlfmt si no existe
          if [ ! -f .yamlfmt ]; then
            cat > .yamlfmt <<EOF
          formatter:
            type: basic
            include_document_start: true
            retain_line_breaks: true
          EOF
          fi
          yamlfmt -formatter retain_line_breaks=true k8s/**/*.yaml

      - name: Ejecutar script de corrección inteligente (agente)
        run: |
          echo "🤖 Ejecutando agente corrector de manifiestos Kubernetes..."
          python scripts/k8s-fixer.py k8s/

      - name: Verificar cambios generados
        id: changes
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Cambios detectados:"
            git status -s
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ No se requieren correcciones."
          fi

      - name: Commit y push de correcciones (solo si hay cambios)
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "k8s-fixer[bot]"
          git config user.email "k8s-fixer[bot]@users.noreply.github.com"
          git add k8s/
          git commit -m "🤖 Auto-corrección de manifiestos Kubernetes"
          git push

      - name: Comentar en PR (opcional, si el evento es pull_request)
        if: github.event_name == 'pull_request' && steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const issue_number = context.issue.number;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: '⚠️ Se detectaron problemas en los manifiestos Kubernetes y se aplicaron correcciones automáticas. Revisa el commit más reciente.'
            });
